<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 100" width="100%" height="100%">
  <!-- Left Box (Red square) -->
  <rect x="0" y="0" width="100" height="100" fill="#A61B1B" />
  
  <!-- Monogram CA inside red square -->
  <!-- "C" Arc (Open on the right, thickness 6.5) -->
  <path d="M 68 32 A 26 26 0 1 0 68 68" stroke="white" stroke-width="6.5" fill="none" stroke-linecap="round" />
  <!-- "A" Inside triangle -->
  <polygon points="50,38 38,60 62,60" fill="white" />
  <!-- "A" Legs -->
  <path d="M 40.5 60 L 31 75 M 59.5 60 L 69 75" stroke="white" stroke-width="6.5" stroke-linecap="round" />
  
  <!-- Right Box (Teal polygon with chamfered top-right corner) -->
  <!-- Gap of 5px, starts at x=105 -->
  <polygon points="105,0 450,0 480,30 480,100 105,100" fill="#0C4566" />
  
  <!-- Text inside Teal box -->
  <text x="125" y="34" font-family="Montserrat, Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" letter-spacing="1.2">CAJA DE SEGURIDAD</text>
  <text x="125" y="60" font-family="Montserrat, Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="white" letter-spacing="1.2">SOCIAL PARA ABOGADOS</text>
  <text x="125" y="82" font-family="Montserrat, Inter, system-ui, sans-serif" font-size="11" font-weight="400" fill="#E2E8F0" letter-spacing="2.8">DE LA PROVINCIA DE SALTA</text>
</svg>
