<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar &mdash; Sistema de Valuaciones</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-body">

    <div class="login-wrapper">
        <div class="login-box">
            <div class="login-header">
                <div class="login-logo">SV</div>
                <h1>Sistema de Valuaciones</h1>
                <p>Ingrese sus credenciales para continuar</p>
            </div>
            <div class="login-body-inner">
                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="form-group">
                        <label>Usuario</label>
                        <input type="text" name="username" placeholder="Nombre de usuario" autofocus autocomplete="username" required>
                    </div>
                    <div class="form-group" style="margin-top: 14px;">
                        <label>Contraseña</label>
                        <input type="password" name="password" placeholder="Contraseña" autocomplete="current-password" required>
                    </div>
                    <button type="submit" class="btn btn-primary login-btn">Ingresar</button>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
